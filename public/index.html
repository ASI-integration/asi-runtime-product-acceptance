<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ASI Mini Service Desk</title><link rel="stylesheet" href="/styles.css"></head><body>
<header><div><span class="eyebrow">ASI · Служба эксплуатации</span><h1>Mini Service Desk</h1><p>Заявки по объектам — в одном спокойном рабочем пространстве.</p></div><button id="new">+ Новая заявка</button></header>
<main><section class="toolbar"><label>Объект<input id="filter-property" placeholder="Все объекты"></label><label>Приоритет<select id="filter-priority"><option value="">Все</option></select></label><label>Статус<select id="filter-status"><option value="">Все</option></select></label><button class="secondary" id="clear">Сбросить</button></section><p id="message" role="alert"></p><section id="requests" class="grid"></section></main>
<dialog id="dialog"><form id="form"><div class="dialog-head"><h2 id="form-title">Новая заявка</h2><button type="button" class="icon" id="close">×</button></div><input type="hidden" name="id"><label>Объект<input name="property" required placeholder="Отель Север"></label><label>Номер помещения<input name="room" required placeholder="204"></label><label>Категория<select name="category" required></select></label><label>Описание<textarea name="description" required rows="4" placeholder="Опишите проблему"></textarea></label><div class="split"><label>Приоритет<select name="priority" required></select></label><label>Статус<select name="status"></select></label></div><p id="form-error" role="alert"></p><button type="submit">Сохранить заявку</button></form></dialog>
<script type="module" src="/app.js"></script></body></html>
